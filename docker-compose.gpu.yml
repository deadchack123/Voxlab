services:
  whisper:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: whisper-web-gpu
    ports:
      - "5050:5000"
    volumes:
      - ./data:/data
      - model-cache:/root/.cache/huggingface
      - tts-cache:/root/.local/share/tts
      - wespeaker-cache:/root/.wespeaker
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - pot-provider
    restart: unless-stopped

  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider
    container_name: pot-provider
    init: true
    restart: unless-stopped

volumes:
  model-cache:
  tts-cache:
  wespeaker-cache:
