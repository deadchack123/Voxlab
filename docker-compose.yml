services:
  whisper:
    image: ghcr.io/deadchack123/voxlab:latest
    platform: linux/amd64
    container_name: whisper-web
    ports:
      - "5050:5000"
    volumes:
      - ./data:/data
      - model-cache:/root/.cache/huggingface
      - tts-cache:/root/.local/share/tts
      - wespeaker-cache:/root/.wespeaker
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
    depends_on:
      - pot-provider
    restart: unless-stopped

  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider
    container_name: pot-provider
    init: true
    restart: unless-stopped

volumes:
  model-cache:
  tts-cache:
  wespeaker-cache:
