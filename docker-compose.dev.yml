services:
  whisper:
    build: .
    container_name: whisper-web-dev
    ports:
      - "5050:5000"
    volumes:
      - ./data:/data
      - model-cache:/root/.cache/huggingface
      - tts-cache:/root/.local/share/tts
      - wespeaker-cache:/root/.wespeaker
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
    restart: unless-stopped

volumes:
  model-cache:
  tts-cache:
  wespeaker-cache:
